<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>OTX API Test</title>
<style>
body{background:#07080d;color:#c8d8f0;font-family:monospace;padding:20px}
.ok{color:#00ffaa}.err{color:#ff3c5c}.warn{color:#ffaa00}
pre{background:#0d0f1a;padding:10px;border-radius:6px;font-size:11px;
    white-space:pre-wrap;word-break:break-all;margin-top:6px}
h3{color:#00c8ff;margin:18px 0 4px}
</style></head>
<body>
<h2 style="color:#ff6b35">OTX AlienVault · CORS Test</h2>
<p style="color:#4a5a7a;margin-bottom:8px">Origen: <span id="orig"></span></p>
<div id="results"></div>
<script>
document.getElementById('orig').textContent = window.location.origin;

const tests = [
  {
    name: '1. OTX · pulsos recientes (sin key)',
    url:  'https://otx.alienvault.com/api/v1/pulses/activity?limit=5'
  },
  {
    name: '2. OTX · indicadores recientes por tipo IP',
    url:  'https://otx.alienvault.com/api/v1/indicators/export?type=IPv4&limit=5'
  },
  {
    name: '3. OTX · subscribed pulses (sin autenticación)',
    url:  'https://otx.alienvault.com/api/v1/pulses/subscribed?limit=5'
  },
  {
    name: '4. OTX · via corsproxy.io',
    url:  'https://corsproxy.io/?' + encodeURIComponent('https://otx.alienvault.com/api/v1/pulses/activity?limit=5')
  },
];

const div = document.getElementById('results');
(async () => {
  for (const t of tests) {
    const block = document.createElement('div');
    const id = 'r' + Math.random().toString(36).slice(2);
    block.innerHTML = '<h3>' + t.name + '</h3><pre id="' + id + '">probando...</pre>';
    div.appendChild(block);
    const pre = document.getElementById(id);
    try {
      const r = await fetch(t.url, {cache:'no-store'});
      const text = await r.text();
      pre.className = r.ok && text.length > 50 ? 'ok' : 'warn';
      pre.textContent = 'HTTP ' + r.status + ' · ' + text.length + ' bytes\n\n' + text.substring(0,400);
    } catch(e) {
      pre.className = 'err';
      pre.textContent = 'ERROR: ' + e.message;
    }
  }
})();
</script>
</body></html>
