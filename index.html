<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>API Test C+D</title>
<style>
body{background:#07080d;color:#c8d8f0;font-family:monospace;padding:20px}
.ok{color:#00ffaa}.err{color:#ff3c5c}.warn{color:#ffaa00}
pre{background:#0d0f1a;padding:10px;border-radius:6px;font-size:11px;
    white-space:pre-wrap;word-break:break-all;margin-top:6px}
h3{color:#00c8ff;margin:18px 0 4px}
h2{color:#ff6b35;margin-bottom:4px}
hr{border-color:#1a2540;margin:24px 0}
</style></head>
<body>
<h2>API Test · Phishing + Certificate Transparency</h2>
<p style="color:#4a5a7a;margin-bottom:8px">Origen: <span id="orig"></span></p>
<div id="results"></div>
<script>
document.getElementById('orig').textContent = window.location.origin;

const tests = [
  // ── OPCIÓN C: Phishing ──────────────────────────────────────────────
  {
    name: 'C1. OpenPhish · feed público (texto plano)',
    url: 'https://openphish.com/feed.txt'
  },
  {
    name: 'C2. OpenPhish · via corsproxy.io',
    url: 'https://corsproxy.io/?' + encodeURIComponent('https://openphish.com/feed.txt')
  },
  {
    name: 'C3. PhishTank · feed JSON (sin key)',
    url: 'https://data.phishtank.com/data/online-valid.json'
  },
  {
    name: 'C4. PhishTank · via corsproxy.io',
    url: 'https://corsproxy.io/?' + encodeURIComponent('https://data.phishtank.com/data/online-valid.json')
  },

  // ── OPCIÓN D: Certificate Transparency (crt.sh) ─────────────────────
  {
    name: 'D1. crt.sh · búsqueda JSON directa',
    url: 'https://crt.sh/?q=%.github.io&output=json&limit=5'
  },
  {
    name: 'D2. crt.sh · via corsproxy.io',
    url: 'https://corsproxy.io/?' + encodeURIComponent('https://crt.sh/?q=%.github.io&output=json&limit=5')
  },

  // ── BONUS: APIs que sabemos que funcionan (referencia) ───────────────
  {
    name: 'REF. NIST NVD (sabemos que funciona)',
    url: 'https://services.nvd.nist.gov/rest/json/cves/2.0/?resultsPerPage=2'
  },
];

const div = document.getElementById('results');
(async () => {
  for (const t of tests) {
    const block = document.createElement('div');
    const id = 'r' + Math.random().toString(36).slice(2);
    block.innerHTML = '<h3>' + t.name + '</h3><pre id="' + id + '">probando...</pre>';
    div.appendChild(block);
    const pre = document.getElementById(id);
    try {
      const r = await fetch(t.url, {cache:'no-store'});
      const text = await r.text();
      const ok = r.ok && text.length > 50;
      pre.className = ok ? 'ok' : 'warn';
      pre.textContent = 'HTTP ' + r.status + ' · ' + text.length + ' bytes\n\n'
        + text.substring(0, 300) + (text.length > 300 ? '\n...' : '');
    } catch(e) {
      pre.className = 'err';
      pre.textContent = 'ERROR: ' + e.message;
    }
  }
})();
</script>
</body></html>
