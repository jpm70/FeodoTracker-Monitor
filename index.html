<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>CORS Test · GhostAcademy</title>
<style>
body{background:#07080d;color:#c8d8f0;font-family:monospace;padding:20px}
.ok{color:#00ffaa}.err{color:#ff3c5c}.warn{color:#ffaa00}
h2{color:#00c8ff;margin:20px 0 10px}
pre{background:#0d0f1a;padding:12px;border-radius:6px;font-size:12px;white-space:pre-wrap;word-break:break-all}
</style></head>
<body>
<h1 style="color:#ff6b35">&#9654; CORS Endpoint Tester</h1>
<p style="color:#4a5a7a">Probando todos los endpoints relevantes desde este origen...</p>
<div id="origin" style="color:#ffaa00;margin:10px 0"></div>
<div id="results"></div>

<script>
document.getElementById('origin').textContent = 'Origen: ' + window.location.origin;

const tests = [
  // Feodo CSV
  { name:'Feodo CSV · allorigins',
    fn: () => fetch('https://api.allorigins.win/raw?url='+encodeURIComponent('https://feodotracker.abuse.ch/downloads/ipblocklist.csv'),{cache:'no-store'}) },
  { name:'Feodo CSV · corsproxy.io',
    fn: () => fetch('https://corsproxy.io/?'+encodeURIComponent('https://feodotracker.abuse.ch/downloads/ipblocklist.csv'),{cache:'no-store'}) },
  { name:'Feodo CSV · directo',
    fn: () => fetch('https://feodotracker.abuse.ch/downloads/ipblocklist.csv',{cache:'no-store'}) },

  // URLhaus — para comparar (sabemos que funciona)
  { name:'URLhaus API v1 (funciona?)',
    fn: () => fetch('https://urlhaus-api.abuse.ch/v1/urls/recent/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'limit=3',cache:'no-store'}) },
  { name:'URLhaus CSV · allorigins',
    fn: () => fetch('https://api.allorigins.win/raw?url='+encodeURIComponent('https://urlhaus.abuse.ch/downloads/csv_recent/'),{cache:'no-store'}) },

  // Proxies solos
  { name:'allorigins.win accesible?',
    fn: () => fetch('https://api.allorigins.win/raw?url=https://httpbin.org/get',{cache:'no-store'}) },
  { name:'corsproxy.io accesible?',
    fn: () => fetch('https://corsproxy.io/?https://httpbin.org/get',{cache:'no-store'}) },
];

async function run() {
  const div = document.getElementById('results');
  for (const t of tests) {
    const block = document.createElement('div');
    block.innerHTML = '<h2>' + t.name + '</h2><pre id="r_'+t.name+'">⏳ probando...</pre>';
    div.appendChild(block);
    const pre = document.getElementById('r_'+t.name);
    try {
      const r = await t.fn();
      const text = await r.text();
      const preview = text.substring(0,200).replace(/</g,'&lt;');
      pre.className = text.length > 50 ? 'ok' : 'warn';
      pre.innerHTML = '✅ HTTP ' + r.status + ' · ' + text.length + ' bytes\n\n' + preview + (text.length>200?'\n...':'');
    } catch(e) {
      pre.className = 'err';
      pre.innerHTML = '❌ ERROR: ' + e.message;
    }
  }
}
run();
</script>
</body></html>
