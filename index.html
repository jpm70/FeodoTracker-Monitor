<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>API Test</title>
<style>body{background:#07080d;color:#c8d8f0;font-family:monospace;padding:20px}
.ok{color:#00ffaa}.err{color:#ff3c5c}
pre{background:#0d0f1a;padding:10px;border-radius:6px;font-size:11px;white-space:pre-wrap;word-break:break-all}
h3{color:#00c8ff;margin:16px 0 6px}</style></head>
<body>
<h2 style="color:#ff6b35">API CORS Test</h2>
<div id="results"></div>
<script>
const tests = [
  { name: 'NIST NVD · CVEs recientes',
    fn: () => fetch('https://services.nvd.nist.gov/rest/json/cves/2.0/?resultsPerPage=3&startIndex=0')
  },
  { name: 'CISA KEV · vulnerabilidades explotadas',
    fn: () => fetch('https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json')
  },
];
const div = document.getElementById('results');
(async () => {
  for (const t of tests) {
    const block = document.createElement('div');
    block.innerHTML = '<h3>' + t.name + '</h3><pre id="r'+t.name+'">probando...</pre>';
    div.appendChild(block);
    const pre = document.getElementById('r'+t.name);
    try {
      const r = await t.fn();
      const text = await r.text();
      pre.className = 'ok';
      pre.textContent = 'HTTP ' + r.status + ' · ' + text.length + ' bytes\n' + text.substring(0,300);
    } catch(e) {
      pre.className = 'err';
      pre.textContent = 'ERROR: ' + e.message;
    }
  }
})();
</script></body></html>
